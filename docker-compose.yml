# ══════════════════════════════════════════════════════════
# Gestor de Leads API — Docker Compose
# Deploy no Servidor BACKEND (CPX31 — 157.180.45.175)
# Conecta no PostgreSQL e Redis do Servidor CORE (CCX13)
# ══════════════════════════════════════════════════════════

version: '3.8'

services:
  # ── API Principal ──
  api:
    build: .
    container_name: gestor-leads-api
    restart: unless-stopped
    ports:
      - "3333:3333"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    networks:
      - gestor-leads-net
    depends_on:
      - minio
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3333/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── MinIO (Storage S3-compatible para mídias) ──
  minio:
    image: minio/minio:latest
    container_name: gestor-leads-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"  # API S3
      - "9001:9001"  # Console Web
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    networks:
      - gestor-leads-net

networks:
  gestor-leads-net:
    driver: bridge

volumes:
  minio_data:
